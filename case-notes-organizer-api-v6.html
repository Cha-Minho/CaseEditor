      render();
    }

    function addTopicDragHandlers(line, topic) {
      line.addEventListener("dragstart", (event) => {
        if (Array.from(event.dataTransfer.types || []).includes("application/x-case-ids")) return;
        state.dragTopicId = topic.id;
        event.dataTransfer.effectAllowed = "move";
        event.dataTransfer.setData("text/plain", topic.id);
        line.classList.add("dragging");
      });

      line.addEventListener("dragover", (event) => {
        if (draggedCaseIds(event).length) return;
        if (!canDropTopic(state.dragTopicId, topic.id)) return;
        event.preventDefault();
        event.dataTransfer.dropEffect = "move";
        clearDropMarkers();
        line.classList.add(dropClass(event, line));
      });

      line.addEventListener("dragleave", () => {
        line.classList.remove("drop-before", "drop-inside", "drop-after");
      });

      line.addEventListener("drop", (event) => {
        if (draggedCaseIds(event).length) return;
        if (!canDropTopic(state.dragTopicId, topic.id)) return;
        event.preventDefault();
        const position = dropClass(event, line).replace("drop-", "");
        moveTopic(state.dragTopicId, topic.id, position);
        clearDropMarkers();
      });

      line.addEventListener("dragend", () => {
        state.dragTopicId = null;
        clearDropMarkers();
      });
    }

    function dropClass(event, element) {
      const rect = element.getBoundingClientRect();
      const ratio = (event.clientY - rect.top) / rect.height;
      if (ratio < 0.28) return "drop-before";
      if (ratio > 0.72) return "drop-after";
      return "drop-inside";
    }

    function clearDropMarkers() {
      document.querySelectorAll(".topic-line").forEach((line) => {
        line.classList.remove("dragging", "drop-before", "drop-inside", "drop-after");
      });
    }

    function canDropTopic(dragId, targetId) {
      if (!dragId || !targetId || dragId === targetId) return false;
      const drag = findTopic(dragId);
      if (!drag) return false;
      return !collectTopicIds(drag.node).includes(targetId);
    }

    function moveTopic(dragId, targetId, position) {
      if (!canDropTopic(dragId, targetId)) return false;
      const drag = findTopic(dragId);
      const movingNode = drag.node;
      const dragIndex = drag.siblings.findIndex((node) => node.id === dragId);
      pushUndo("목차 이동");
      drag.siblings.splice(dragIndex, 1);

      if (position === "inside") {
        const target = findTopic(targetId);
        target.node.children = target.node.children || [];
        target.node.children.push(movingNode);
        state.expandedTopicIds.add(targetId);
      } else {
        const target = findTopic(targetId);
        const targetIndex = target.siblings.findIndex((node) => node.id === targetId);
        target.siblings.splice(position === "before" ? targetIndex : targetIndex + 1, 0, movingNode);
      }

      render();
      toast("목차 위치를 옮겼습니다.");
      return true;
    }

    function renderCases() {
      const cases = filteredCases();
      els.caseCount.textContent = cases.length;
      if (els.caseHeading) els.caseHeading.textContent = state.showImportantOnly ? "중요 판례" : "검색";
      els.caseList.innerHTML = "";

      if (!cases.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = state.showImportantOnly ? "별표한 판례가 없습니다." : (state.query ? "검색 결과가 없습니다." : "판례 추가 버튼으로 판례를 추가하세요.");
        els.caseList.appendChild(empty);
        return;
      }

      cases.forEach((item) => {
        const row = document.createElement("div");
        row.className = `case-item ${state.selectedCaseId === item.id ? "active" : ""}`;
        row.setAttribute("role", "button");
        row.tabIndex = 0;
        row.dataset.caseId = item.id;

        const copy = document.createElement("div");
        copy.className = "case-copy";
        const hasNote = Boolean(item.summary || item.holding || item.judgmentSummary || item.keyPhrases || item.majority || item.dissent || item.source);
        const statusPill = item.apiStatus === "pending"
          ? '<span class="pill pending">불러오는 중</span>'
          : item.apiStatus === "failed"
            ? '<span class="pill failed">불러오기 실패</span>'
            : "";
        copy.innerHTML = `
          <span class="case-title">${item.important ? "★ " : ""}${escapeHtml(item.title || item.caseNo || "제목 없음")}</span>
          <span class="case-meta">
            <span>${escapeHtml(getTopicPath(item.topicId))}</span>
            ${item.caseNo ? `<span>${escapeHtml(item.caseNo)}</span>` : ""}
            ${hasNote ? '<span class="pill">정리됨</span>' : ""}
            ${statusPill}
          </span>
        `;

        row.append(copy);
        row.addEventListener("click", (event) => handleCaseRowClick(item.id, event));
        row.addEventListener("keydown", (event) => {
          if (event.key === "Enter") handleCaseRowClick(item.id, event);
        });
        els.caseList.appendChild(row);
      });
    }

    function filteredCases() {
      const query = state.query.trim().toLowerCase();
      return state.cases
        .filter((item) => !state.showImportantOnly || item.important)
        .filter((item) => {
          if (!query) return true;
          return formFields.some((field) => String(item[field] || "").toLowerCase().includes(query));
        })
        .sort((a, b) => (a.title || "").localeCompare(b.title || "", "ko"));
    }

    function handleCaseRowClick(id, event) {
      if (event.target.closest("input, button, select")) return;
      state.selectedCaseIds = new Set([id]);
      state.lastSelectedCaseId = id;
      state.selectedCaseId = id;
      els.casePane.classList.remove("open");
      render();
    }

    function handleCaseCheckboxClick(id, event) {
      if (event.shiftKey) {
        selectCaseRange(id);
      } else if (event.target.checked) {
        state.selectedCaseIds.add(id);
        state.lastSelectedCaseId = id;
      } else {
        state.selectedCaseIds.delete(id);
        state.lastSelectedCaseId = id;
      }
      state.selectedCaseId = id;
      render();
    }

    function toggleCaseSelected(id) {
      if (state.selectedCaseIds.has(id)) state.selectedCaseIds.delete(id);
      else state.selectedCaseIds.add(id);
    }

    function selectCaseRange(toId) {
      const ids = filteredCases().map((item) => item.id);
      selectCaseRangeWithinIds(toId, ids);
    }

    function selectTopicCaseRange(toId, topicId) {
      const ids = state.cases
        .filter((item) => !item.deletedAt && (item.topicId || null) === (topicId || null))
        .map((item) => item.id);
      selectCaseRangeWithinIds(toId, ids);
    }

    function selectCaseRangeWithinIds(toId, ids) {
      const anchor = state.lastSelectedCaseId && ids.includes(state.lastSelectedCaseId)
        ? state.lastSelectedCaseId
        : toId;
      const start = ids.indexOf(anchor);
      const end = ids.indexOf(toId);
      if (start < 0 || end < 0) {
        state.selectedCaseIds.add(toId);
      } else {
        const [from, to] = start < end ? [start, end] : [end, start];
        ids.slice(from, to + 1).forEach((id) => state.selectedCaseIds.add(id));
      }
      state.lastSelectedCaseId = toId;
    }

    function toggleSelectAllVisible() {
      const ids = filteredCases().map((item) => item.id);
      const allSelected = ids.length > 0 && ids.every((id) => state.selectedCaseIds.has(id));
      ids.forEach((id) => {
        if (allSelected) state.selectedCaseIds.delete(id);
        else state.selectedCaseIds.add(id);
      });
      if (!allSelected && ids.length) {
        state.selectedCaseId = ids[ids.length - 1];
        state.lastSelectedCaseId = ids[0];
      }
      render();
    }

    function renderTopicSelects() {
      fillTopicSelect(els.topicSelect);
    }

    function fillTopicSelect(select) {
      if (!select) return;
      select.innerHTML = "";
      select.appendChild(new Option("미분류", ""));
      flattenTopics().forEach((topic) => {
        select.appendChild(new Option(`${"　".repeat(topic.depth)}${topic.name}`, topic.id));
      });
    }

    function renderTopicPicker() {
      if (!els.topicPickerTree) return;
      const item = selectedCase();
      els.topicPickerTree.innerHTML = "";
      const options = [
        { id: "", name: "미분류", depth: 0 },
        ...flattenTopics()
      ];
      options.forEach((topic) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `topic-picker-option ${(item?.topicId || "") === topic.id ? "active" : ""}`;
        button.style.paddingLeft = `${9 + topic.depth * 18}px`;
        button.textContent = topic.name;
        button.addEventListener("click", () => moveSelectedCaseToTopic(topic.id || null));
        els.topicPickerTree.appendChild(button);
      });
    }

    function moveSelectedCaseToTopic(topicId) {
      const item = selectedCase();
      if (!item) return;
      const targetId = topicId || null;
      if ((item.topicId || null) === targetId) {
        els.topicPickerDialog.close();
        return;
      }
      pushUndo("폴더 변경");
      item.topicId = targetId;
      item.updatedAt = new Date().toISOString();
      state.selectedTopicId = targetId;
      if (targetId) state.expandedTopicIds.add(targetId);
      els.topicPickerDialog.close();
      render();
      toast("판례 위치를 옮겼습니다.");
    }

    function renderEditor() {
      const item = selectedCase();
      els.emptyEditor.classList.toggle("hidden", Boolean(item));
      els.caseForm.classList.toggle("hidden", !item);
      els.assignRow.classList.toggle("hidden", !item);
      els.deleteCaseBtn.classList.toggle("hidden", !item);
      els.editorTools.classList.toggle("hidden", !item);

      if (!item) {
        state.renderedCaseId = null;
        els.editorHeading.contentEditable = "false";
        els.editorHeading.textContent = "판례를 선택하세요";
        els.editorPath.textContent = "미분류 판례나 목차 안의 판례를 고르면 정리 양식이 열립니다.";
        return;
      }

      els.editorHeading.contentEditable = "true";
      els.editorHeading.textContent = item.title || "제목 없음";
      els.editorPath.textContent = item.caseNo ? `${getTopicPath(item.topicId)} · ${item.caseNo}` : getTopicPath(item.topicId);
      if (els.topicSelect) els.topicSelect.value = item.topicId || "";
      if (els.topicPickerBtn) els.topicPickerBtn.textContent = getTopicPath(item.topicId);
      if (els.starCaseBtn) {
        els.starCaseBtn.textContent = item.important ? "★ 중요" : "☆ 중요";
        els.starCaseBtn.classList.toggle("active-tool", item.important);
        els.starCaseBtn.title = item.important ? "중요 판례 표시 해제" : "중요 판례로 표시";
      }

      const activeEditable = document.activeElement?.closest?.(".rich-source, .rich-note");
      const keepEditorDom = state.renderedCaseId === item.id && activeEditable && els.caseForm.contains(activeEditable);
      if (!keepEditorDom) {
        inputFields.forEach((field) => {
          const input = fieldInputs[field];
          if (!input) return;
          input.innerHTML = sanitizeSourceHtml(item[`${field}Html`] || plainTextToHtml(item[field] || ""));
        });

        savedSourceRange = null;
        setSourceTool(null);
        els.sourceEditor.innerHTML = sanitizeSourceHtml(item.sourceHtml || plainTextToHtml(item.source || ""));
        state.renderedCaseId = item.id;
      }
      renderJudgmentSummaryVisibility(item);
      document.querySelectorAll(".field.collapsible").forEach((field) => {
        const key = field.dataset.field;
        const collapsed = state.collapsedFields.has(key);
        field.classList.toggle("collapsed", collapsed);
        const button = field.querySelector(".collapse-toggle");
        if (button) button.textContent = collapsed ? "펼치기" : "접기";
      });
      autoResizeAll();
    }

    function createCase(input) {
      const now = new Date().toISOString();
      const data = typeof input === "string" ? { title: input } : (input || {});
      const rawTitle = String(data.title || data.caseNo || "").trim();
      const caseNo = normalizeCaseNo(data.caseNo || findCaseNoInText(rawTitle) || rawTitle || "");
      const title = rawTitle || caseNo;
      return {
        id: uid("case"),
        title: title || caseNo,
        caseNo,
        topicId: state.selectedTopicId || null,
        source: "",
        sourceHtml: "",
        holding: "",
        holdingHtml: "",
        judgmentSummary: "",
        judgmentSummaryHtml: "",
        keyPhrases: "",
        keyPhrasesHtml: "",
        summary: "",
        summaryHtml: "",
        majority: "",
        majorityHtml: "",
        dissent: "",
        dissentHtml: "",
        concurring: "",
        concurringHtml: "",
        tags: "",
        tagsHtml: "",
        important: Boolean(data.important),
        apiStatus: caseNo ? "pending" : "idle",
        apiError: "",
        createdAt: now,
        updatedAt: now
      };
    }

    async function addCasesFromLines(text) {
      const lines = text
        .split(/\r?\n/)
        .map((line) => String(line || "").replace(/\uFEFF/g, "").trim())
        .filter(Boolean);

      let added = 0;
      let skipped = 0;
      const existingCaseNos = new Set(state.cases.map((item) => normalizeCaseNo(item.caseNo)).filter(Boolean));
      const importedItems = [];
      pushUndo("판례 가져오기");

      for (const line of lines) {
        const caseNo = findCaseNoInText(line) || normalizeCaseNo(line);
        if (existingCaseNos.has(caseNo)) {
          skipped += 1;
          continue;
        }

        const item = createCase({ caseNo, title: line });
        state.cases.push(item);
        importedItems.push(item);
        existingCaseNos.add(caseNo);
        added += 1;
      }

      if (!added) {
        state.undoStack.pop();
        toast("중복이거나 비어 있는 줄만 있어 추가할 항목이 없습니다.");
        return;
      }

      state.selectedCaseIds = new Set(importedItems.map((item) => item.id));
      state.selectedCaseId = importedItems[importedItems.length - 1].id;
      state.lastSelectedCaseId = importedItems[importedItems.length - 1].id;

      render();
      toast(`${added}개 판례를 추가했고, ${skipped}개는 중복으로 건너뛰었습니다.`);

      importedItems.forEach(queueFetchForCase);
    }

    function addCaseByNumber(value) {
      const caseNo = findCaseNoInText(value) || normalizeCaseNo(value);
      if (!caseNo) return false;
      const existing = state.cases.find((caseItem) => normalizeCaseNo(caseItem.caseNo) === caseNo);
      if (existing) {
        state.selectedCaseId = existing.id;
        state.selectedCaseIds = new Set([existing.id]);
        render();
        toast("이미 있는 사건번호입니다.");
        return true;
      }

      pushUndo("판례 추가");
      const item = createCase({ caseNo, title: caseNo });
      state.cases.push(item);
      state.selectedCaseId = item.id;
      state.selectedCaseIds = new Set([item.id]);
      state.lastSelectedCaseId = item.id;
      render();
      queueFetchForCase(item);
      return true;
    }

    function addManualCase(value) {
      const baseTitle = String(value || "").trim() || "빈 판례";
      const title = uniqueCaseTitle(baseTitle);
      const caseNo = findCaseNoInText(baseTitle) || "";
      const item = createCase({ caseNo, title });
      item.topicId = null;
      item.apiStatus = "idle";
      item.apiError = "";
      pushUndo("빈 판례 추가");
      state.cases.push(item);
      state.selectedCaseId = item.id;
      state.selectedCaseIds = new Set([item.id]);
      state.lastSelectedCaseId = item.id;
      state.selectedTopicId = null;
      render();
      toast("API 없이 빈 판례를 만들었습니다.");
      return true;
    }

    function uniqueCaseTitle(baseTitle) {
      const base = String(baseTitle || "").trim() || "빈 판례";
      const titles = new Set(state.cases.map((item) => String(item.title || "").trim()));
      if (!titles.has(base)) return base;
      let index = 2;
      while (titles.has(`${base} (${index})`)) index += 1;
      return `${base} (${index})`;
    }

    function promptTopic(title, initialValue, onDone) {
      els.dialogTitle.textContent = title;
      els.dialogInput.value = initialValue;
      els.nameDialog.showModal();
      els.dialogInput.focus();
      els.dialogInput.select();

      const handleClose = () => {
        els.nameDialog.removeEventListener("close", handleClose);
        if (els.nameDialog.returnValue !== "ok") return;
        const value = els.dialogInput.value.trim();
        if (!value) return;
        onDone(value);
      };
      els.nameDialog.addEventListener("close", handleClose);
    }

    function exportData() {
      const data = JSON.stringify({
        app: "판례 정리함",
        version: 6,
        exportedAt: new Date().toISOString(),
        topics: state.topics,
        cases: state.cases,
        expandedTopicIds: [...state.expandedTopicIds]
      }, null, 2);
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = `판례정리함-백업-${new Date().toISOString().slice(0, 10)}.json`;
      anchor.click();
      URL.revokeObjectURL(url);
    }

    function importBackup(text) {
      try {
        const data = JSON.parse(text);
        if (!Array.isArray(data.topics) || !Array.isArray(data.cases)) throw new Error("bad format");
        pushUndo("백업 불러오기");
        state.topics = data.topics;
        state.cases = data.cases.map(normalizeCase);
        state.selectedTopicId = null;
        state.selectedCaseId = null;
        state.selectedCaseIds.clear();
        state.expandedTopicIds = new Set(Array.isArray(data.expandedTopicIds) ? data.expandedTopicIds : []);
        render();
        toast("백업을 불러왔습니다.");
      } catch {
        toast("백업 파일 형식이 맞지 않습니다.");
      }
    }

    function deleteSelectedCases() {
      const ids = selectedExistingIds();
      if (!ids.length) return;
      if (!confirm(`선택한 ${ids.length}개 판례를 삭제할까요?`)) return;
      pushUndo("판례 삭제");
      state.cases = state.cases.filter((item) => !ids.includes(item.id));
      state.selectedCaseIds.clear();
      if (ids.includes(state.selectedCaseId)) state.selectedCaseId = null;
      render();
    }

    function selectedExistingIds() {
      const existing = new Set(state.cases.map((item) => item.id));
      return [...state.selectedCaseIds].filter((id) => existing.has(id));
    }

    function autoResizeTextarea(textarea) {
      textarea.style.height = "auto";
      textarea.style.height = `${Math.max(textarea.scrollHeight + 2, 86)}px`;

    function autoResizeAll() {
      document.querySelectorAll("textarea.autogrow").forEach(autoResizeTextarea);

    function applySavedSplitWidth() {

    function applySavedPaneWidths() {

    function applyPaneWidth(pane, value) {
      if (!pane || !value) return;
      const numeric = Number.parseFloat(value);
      if (!Number.isFinite(numeric)) return;
      pane.style.setProperty("--pane-width", `${numeric}px`);

    function startPaneResize(event, pane, storageKey) {
      if (!pane) return;
      state.paneResize = {
        pane,
        storageKey,
        startX: event.clientX,
        startWidth: pane.getBoundingClientRect().width,
        handle: event.currentTarget
      };
      event.currentTarget.classList.add("dragging");
      document.body.style.cursor = "ew-resize";
      event.preventDefault();
    }

    function updatePaneResize(clientX) {
      const resize = state.paneResize;
      if (!resize) return;
      const maxWidth = Math.max(320, window.innerWidth - 230);
      const width = Math.min(maxWidth, Math.max(320, resize.startWidth + clientX - resize.startX));
      resize.pane.style.setProperty("--pane-width", `${width}px`);
    }

    function stopPaneResize() {
      const resize = state.paneResize;
      if (!resize) return;
      const width = Math.round(resize.pane.getBoundingClientRect().width);
      try {
        localStorage.setItem(resize.storageKey, String(width));
      } catch {
        // Ignore storage errors.
      }
      resize.handle?.classList.remove("dragging");
      document.body.style.cursor = "";
      state.paneResize = null;
    }

    function updateSplitWidth(clientX) {
      const split = els.caseForm.querySelector(".editor-split");
      if (!split) return;
      const rect = split.getBoundingClientRect();
      const percent = Math.min(72, Math.max(28, ((clientX - rect.left) / rect.width) * 100));
      const value = `${percent.toFixed(1)}%`;
      els.caseForm.style.setProperty("--reference-width", value);
      try {
        localStorage.setItem("case-notes-reference-width", value);
      } catch {
        // Ignore storage errors.
      }
    }

    function stopSplitDrag() {

    function saveCurrentSource() {
      const item = selectedCase();
      if (!item) return;
      if (state.deleteEditing) normalizeEditableFormatting(els.sourceEditor);
      item.sourceHtml = sanitizeSourceHtml(els.sourceEditor.innerHTML, { preserveLegacyHighlights: !state.deleteEditing });
      item.source = els.sourceEditor.innerText || "";
      item.updatedAt = new Date().toISOString();
      state.deleteEditing = false;
      save();
      renderCases();
    }

    function setSourceTool(tool) {
      state.sourceTool = state.sourceTool === tool ? null : tool;
      if (!state.sourceTool) sourceDragStartRange = null;
      els.highlightBtn.classList.toggle("active-tool", state.sourceTool === "highlight");
      els.clearHighlightBtn.classList.toggle("active-tool", state.sourceTool === "erase");
      document.querySelectorAll(".rich-source, .rich-note").forEach((editable) => {
        editable.classList.toggle("tool-highlight", state.sourceTool === "highlight");
        editable.classList.toggle("tool-erase", state.sourceTool === "erase");
      });
    }

    function applySourceToolToSelection() {
      const item = selectedCase();
      if (!item || !state.sourceTool) return;
      rememberSourceSelection();
      restoreSourceSelection();
      const editable = selectedEditableRoot();
      if (!editable) return;
      editable.focus();
      restoreSourceSelection();
      if (state.sourceTool === "erase") {
        eraseHighlightsFromSelection(editable);
      } else {
        highlightSelection(editable);
      }
      saveEditableContent(editable);
      savedSourceRange = null;
    }

    function selectedRangeInEditable(editable) {
      const selection = window.getSelection();
      if (!selection || selection.rangeCount === 0 || selection.isCollapsed) return null;
      const range = selection.getRangeAt(0);
      return editable.contains(range.commonAncestorContainer) ? range : null;
    }

    function highlightSelection(editable) {
      const range = selectedRangeInEditable(editable);
      if (!range) return;
      const marker = document.createElement("mark");
      marker.className = "case-highlight";
      marker.dataset.caseHighlight = "true";
      marker.appendChild(range.extractContents());
      range.insertNode(marker);
      mergeSiblingHighlights(marker);
      placeCaretAfter(marker);
    }

    function eraseHighlightsFromSelection(editable) {
      const range = selectedRangeInEditable(editable);
      if (!range) return;
      const walker = document.createTreeWalker(editable, NodeFilter.SHOW_ELEMENT);
      const targets = [];
      while (walker.nextNode()) {
        const node = walker.currentNode;
        if (!isHighlightNode(node)) continue;
        try {
          if (range.intersectsNode(node)) targets.push(node);
        } catch {
          // Ignore nodes the range cannot compare with.
        }
      }
      let node = range.commonAncestorContainer.nodeType === 1
        ? range.commonAncestorContainer
        : range.commonAncestorContainer.parentElement;
      while (node && node !== editable) {
        if (isHighlightNode(node)) targets.push(node);
        node = node.parentElement;
      }
      [...new Set(targets)].forEach(unwrapElement);
      editable.normalize();
    }

    function isHighlightNode(node) {
      if (!node || node.nodeType !== 1) return false;
      const style = node.getAttribute("style") || "";
      return node.matches("mark, .case-highlight, [data-case-highlight='true']") || /background/i.test(style);
    }

    function isTransientHighlightNode(node) {
      if (!node || node.nodeType !== 1) return false;
      const style = node.getAttribute("style") || "";
      return !node.matches("mark, .case-highlight, [data-case-highlight='true']") && /background/i.test(style);
    }

    function normalizeEditableFormatting(editable) {
      editable.querySelectorAll("font").forEach(unwrapElement);
      editable.querySelectorAll("*").forEach((node) => {
        if (isHighlightNode(node)) return;
        node.removeAttribute("style");
        node.removeAttribute("class");
      });
      editable.querySelectorAll("span").forEach((node) => {
        if (!isHighlightNode(node)) unwrapElement(node);
      });
    }

    function unwrapElement(element) {
      const parent = element.parentNode;
      if (!parent) return;
      while (element.firstChild) parent.insertBefore(element.firstChild, element);
      parent.removeChild(element);
      parent.normalize();
    }

    function mergeSiblingHighlights(marker) {
      if (!marker?.parentNode) return;
      ["previousSibling", "nextSibling"].forEach((side) => {
        const sibling = marker[side];
        if (!isHighlightNode(sibling)) return;
        if (side === "previousSibling") {
          while (marker.firstChild) sibling.appendChild(marker.firstChild);
          marker.remove();
          marker = sibling;
        } else {
          while (sibling.firstChild) marker.appendChild(sibling.firstChild);
          sibling.remove();
        }
      });
    }

    function placeCaretAfter(node) {
      const range = document.createRange();
      range.setStartAfter(node);
      range.collapse(true);
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function rememberSourceSelection() {
      const selection = window.getSelection();
      if (!selection || selection.rangeCount === 0 || selection.isCollapsed) return;
      const range = selection.getRangeAt(0);
      const node = range.commonAncestorContainer.nodeType === 1
        ? range.commonAncestorContainer
        : range.commonAncestorContainer.parentNode;
      if (editableRootForNode(node)) savedSourceRange = range.cloneRange();
    }

    function restoreSourceSelection() {
      if (!savedSourceRange) return;
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(savedSourceRange);
    }

    function rangeFromPoint(x, y) {
      let range = null;
      if (document.caretRangeFromPoint) {
        range = document.caretRangeFromPoint(x, y);
      } else if (document.caretPositionFromPoint) {
        const position = document.caretPositionFromPoint(x, y);
        if (position) {
          range = document.createRange();
          range.setStart(position.offsetNode, position.offset);
          range.collapse(true);
        }
      }
      if (!range) return null;
      const node = range.startContainer.nodeType === 1
        ? range.startContainer
        : range.startContainer.parentNode;
      return editableRootForNode(node) ? range : null;
    }

    function rangeBetween(startRange, endRange) {
      if (!startRange || !endRange) return null;
      const range = document.createRange();
      if (startRange.compareBoundaryPoints(Range.START_TO_START, endRange) <= 0) {
        range.setStart(startRange.startContainer, startRange.startOffset);
        range.setEnd(endRange.startContainer, endRange.startOffset);
      } else {
        range.setStart(endRange.startContainer, endRange.startOffset);
        range.setEnd(startRange.startContainer, startRange.startOffset);
      }
      return range.collapsed ? null : range;
    }

    function showSourceRange(range) {
      if (!range) return;
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
      savedSourceRange = range.cloneRange();
    }

    function beginSourceToolDrag(event) {
      if (!state.sourceTool || event.button !== 0 || !editableRootForNode(event.target)) return;
      sourceDragStartRange = rangeFromPoint(event.clientX, event.clientY);
      if (sourceDragStartRange) event.preventDefault();
    }

    function updateSourceToolDrag(event) {
      if (!state.sourceTool || !sourceDragStartRange || event.buttons !== 1) return;
      event.preventDefault();
      showSourceRange(rangeBetween(sourceDragStartRange, rangeFromPoint(event.clientX, event.clientY)));
    }

    function finishSourceToolDrag(event) {
      if (!state.sourceTool || !sourceDragStartRange) return false;
      event.preventDefault();
      const range = rangeBetween(sourceDragStartRange, rangeFromPoint(event.clientX, event.clientY));
      sourceDragStartRange = null;
      if (!range) return true;
      showSourceRange(range);
      applySourceToolToSelection();
      return true;
    }

    function selectionInsideSource() {
      return Boolean(selectedEditableRoot());
    }

    function editableRootForNode(node) {
      if (!node) return null;
      const element = node.nodeType === 1 ? node : node.parentNode;
      return element?.closest?.(".rich-source, .rich-note") || null;
    }

    function selectedEditableRoot() {
      const selection = window.getSelection();
      if (!selection || selection.rangeCount === 0 || selection.isCollapsed) return false;
      const range = selection.getRangeAt(0);
      const node = range.commonAncestorContainer.nodeType === 1
        ? range.commonAncestorContainer
        : range.commonAncestorContainer.parentNode;
      return editableRootForNode(node);
    }

    function saveEditableContent(editable) {
      if (editable === els.sourceEditor) {
        saveCurrentSource();
        return;
      }
      const item = selectedCase();
      const field = editable.dataset.name;
      if (!item || !field) return;
      item[`${field}Html`] = sanitizeSourceHtml(editable.innerHTML);
      item[field] = editable.innerText || "";
      item.updatedAt = new Date().toISOString();
      save();
      renderCases();
    }

    function sanitizeSourceHtml(html, options = {}) {
      const preserveLegacyHighlights = options.preserveLegacyHighlights !== false;
      const raw = String(html || "");
      const hasHighlightMarkup = /<\s*(mark|span)\b/i.test(raw);
      const hasEscapedBreakTags = /&lt;\s*\/?\s*(br|p|div|li|tr|h[1-6])\b/i.test(raw);
      if (!hasHighlightMarkup && hasEscapedBreakTags) {
        return plainTextToHtml(sourceHtmlToPlainText(raw));
      }

      const root = document.createElement("div");
      root.innerHTML = raw;
      root.querySelectorAll("script, style, iframe, object, embed, link, meta").forEach((node) => node.remove());
      root.querySelectorAll("*").forEach((node) => {
        const allowed = ["MARK", "SPAN", "BR", "DIV", "P", "B", "I", "STRONG", "EM", "U"].includes(node.tagName);
        if (!allowed) {
          node.replaceWith(...Array.from(node.childNodes));
          return;
        }
        const hadBackground = /background/i.test(node.getAttribute("style") || "");
        const hadHighlightClass = node.classList?.contains("case-highlight") || node.dataset?.caseHighlight === "true";
        [...node.attributes].forEach((attr) => node.removeAttribute(attr.name));
        if ((node.tagName === "SPAN" || node.tagName === "MARK") && (hadHighlightClass || (preserveLegacyHighlights && hadBackground))) {
          const mark = document.createElement("mark");
          mark.className = "case-highlight";
          mark.dataset.caseHighlight = "true";
          while (node.firstChild) mark.appendChild(node.firstChild);
          node.replaceWith(mark);
        }
      });
      return root.innerHTML;
    }

    function plainTextToHtml(text) {
      return escapeHtml(normalizeTextLines(text || "")).replace(/\n/g, "<br>");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    els.addTopicBtn.addEventListener("click", () => {
      const value = els.topicNameInput.value.trim();

      if (event.key === "Enter") els.addTopicBtn.click();
    });

    els.dialogInput.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      els.nameDialog.returnValue = "ok";
      els.nameDialog.close("ok");
    });

    els.editorHeading.addEventListener("input", () => {
      const item = selectedCase();
      if (!item || els.editorHeading.contentEditable !== "true") return;
      item.title = normalizeTextLines(els.editorHeading.innerText || "").replace(/\n/g, " ").trim();
      item.updatedAt = new Date().toISOString();
      save();
      renderCases();
      renderTopics();
    });

    els.editorHeading.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      els.editorHeading.blur();
    });

    els.editorHeading.addEventListener("blur", () => {
      const item = selectedCase();
      if (!item) return;
      if (!item.title) item.title = item.caseNo || "제목 없음";
      els.editorHeading.textContent = item.title;
      save();
      renderCases();
      renderTopics();
    });

    els.searchInput.addEventListener("input", (event) => {
      state.query = event.target.value;
      renderCases();
    });

    els.topicPickerBtn.addEventListener("click", () => {
      renderTopicPicker();
      els.topicPickerDialog.showModal();
    });

    els.topicSelect.addEventListener("change", (event) => {
      const item = selectedCase();
      if (!item) return;
      pushUndo("폴더 변경");
      item.topicId = event.target.value || null;
      item.updatedAt = new Date().toISOString();
      state.selectedTopicId = item.topicId;
      render();
    });

    els.deleteCaseBtn.addEventListener("click", () => {
      const item = selectedCase();
      if (!item) return;
      if (!confirm(`'${item.title}' 판례를 삭제할까요?`)) return;
      pushUndo("판례 삭제");
      state.cases = state.cases.filter((caseItem) => caseItem.id !== item.id);
      state.selectedCaseIds.delete(item.id);
      state.selectedCaseId = null;
      render();
    });

    els.starCaseBtn.addEventListener("click", () => {
      const item = selectedCase();
      if (!item) return;
      pushUndo("중요 표시 변경");
      item.important = !item.important;
      item.updatedAt = new Date().toISOString();
      save();
      renderTopics();
      renderCases();
      renderEditor();
      toast(item.important ? "중요 판례로 표시했습니다." : "중요 표시를 해제했습니다.");
    });

    els.caseForm.addEventListener("input", (event) => {
      const item = selectedCase();
      const field = event.target.dataset.name || event.target.name;
      if (!item || !field) return;
      if (event.target.isContentEditable) {
        if (state.deleteEditing) normalizeEditableFormatting(event.target);
        item[`${field}Html`] = sanitizeSourceHtml(event.target.innerHTML, { preserveLegacyHighlights: !state.deleteEditing });
        item[field] = event.target.innerText || "";
        state.deleteEditing = false;
      } else {
        item[field] = event.target.value;
      }
      item.updatedAt = new Date().toISOString();
      if (event.target.matches("textarea")) autoResizeTextarea(event.target);
      save();
      renderCases();
      renderTopics();
    });
    els.caseForm.addEventListener("blur", (event) => {
      if (!event.target.isContentEditable || event.target === els.sourceEditor) return;
      saveEditableContent(event.target);
    }, true);

    els.sourceEditor.addEventListener("input", saveCurrentSource);
    els.caseForm.addEventListener("keydown", (event) => {
      if (event.key === "Backspace" || event.key === "Delete") state.deleteEditing = true;
    }, true);
    els.caseForm.addEventListener("mousedown", beginSourceToolDrag);
    els.caseForm.addEventListener("mousemove", updateSourceToolDrag);
    els.caseForm.addEventListener("keyup", rememberSourceSelection);
    els.caseForm.addEventListener("mouseup", (event) => {
      if (finishSourceToolDrag(event)) return;
      if (!state.sourceTool) {
        rememberSourceSelection();
        return;
      }
      window.setTimeout(applySourceToolToSelection, 0);
    });
    els.caseForm.addEventListener("contextmenu", (event) => {
      if (!state.sourceTool) return;
      event.preventDefault();
      event.stopPropagation();
      setSourceTool(null);
      toast("원문 도구를 껐습니다.");
    });
    els.caseForm.addEventListener("paste", (event) => {
      if (!event.target.isContentEditable) return;
      event.preventDefault();
      const text = event.clipboardData.getData("text/plain");
      document.execCommand("insertText", false, text);
    });
    els.sourceEditor.addEventListener("blur", () => {
      const item = selectedCase();
      if (!item) return;
      item.sourceHtml = sanitizeSourceHtml(els.sourceEditor.innerHTML);
      saveCurrentSource();
    });

    [els.highlightBtn, els.clearHighlightBtn].forEach((button) => {
      button.addEventListener("mousedown", (event) => {
        event.preventDefault();
      });
    });
    els.highlightBtn.addEventListener("click", () => setSourceTool("highlight"));
    els.clearHighlightBtn.addEventListener("click", () => setSourceTool("erase"));

    els.splitResizer.addEventListener("mousedown", startSplitDrag);
    els.topicPaneResizer.addEventListener("mousedown", (event) => startPaneResize(event, els.topicPane, "case-notes-topic-pane-width"));
    els.casePaneResizer.addEventListener("mousedown", (event) => startPaneResize(event, els.casePane, "case-notes-case-pane-width"));
    document.addEventListener("mousemove", (event) => {
      if (state.paneResize) {
        updatePaneResize(event.clientX);
        return;
      }
      if (!state.splitDragging) return;
      updateSplitWidth(event.clientX);
    });
    document.addEventListener("mouseup", () => {
      stopPaneResize();
      stopSplitDrag();
    });

    document.addEventListener("selectionchange", rememberSourceSelection);
    document.addEventListener("contextmenu", () => {
      if (!state.sourceTool) return;
      setSourceTool(null);
      toast("원문 도구를 껐습니다.");
    });

    document.addEventListener("keydown", (event) => {
      if (event.key !== "Escape") return;
      els.topicPane.classList.remove("open");
      els.casePane.classList.remove("open");
      renderPaneLayout();
    });

    document.querySelectorAll(".collapse-toggle").forEach((button) => {
      button.addEventListener("click", () => {
        const field = button.dataset.toggleField;
        if (state.collapsedFields.has(field)) state.collapsedFields.delete(field);
        else state.collapsedFields.add(field);
        renderEditor();
      });
    });

    (async function init() {
      applySavedSplitWidth();
      applySavedPaneWidths();
      await restoreSaveFileHandle();
      await load();
      render();
    })();
  </script>
</body>
</html>
